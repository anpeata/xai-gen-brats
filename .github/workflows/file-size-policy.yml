name: file-size-policy

on:
  push:
  pull_request:

jobs:
  enforce-max-file-size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block files larger than 5 MB
        shell: bash
        run: |
          limit=$((5 * 1024 * 1024))
          violations=$(git ls-tree -r -l HEAD | awk -v max="$limit" '$4 > max {printf "%s (%s bytes)\n", $5, $4}')

          if [ -n "$violations" ]; then
            echo "Repository policy violation: files larger than 5 MB detected:"
            echo "$violations"
            exit 1
          fi

          echo "File size policy check passed."

  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install monai nibabel numpy matplotlib tqdm

      - name: Smoke test CLI entrypoints
        shell: bash
        run: |
          python -c "import torch, monai, nibabel, numpy; print('imports_ok')"
          python -m scripts.evaluate --help
          python -m scripts.uncertainty --help
          python -m scripts.predict_overlay --help
          python -m scripts.run_xai --help
          python -m scripts.download_brats --help
          python -m scripts.aggregate_seed_metrics --help
          python -m scripts.run_phase5_long_dose8_campaign --dry-run --seeds 42 --epochs 1 --max-train-batches 1 --max-val-batches 1 --no-progress --quiet-warnings --skip-existing
